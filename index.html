<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBATY GRENOBLE</title>
<style>
:root{--blue:#1976B5;--blue-dark:#145A8C;--orange:#E8841A;--orange-light:#F4A94D;--white:#fff;--gray:#f4f5f7;--gray2:#e0e3e8;--gray3:#888;--text:#333;--danger:#e53935;--success:#43a047;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--gray);color:var(--text);display:flex;min-height:100vh}
#loadingScreen{position:fixed;inset:0;background:var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff}
#loadingScreen h1{font-size:2em;margin-bottom:10px}
#loadingScreen p{opacity:.8;font-size:1.1em}
.spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
#app{display:none;width:100%;min-height:100vh}
#sidebar{width:260px;min-width:260px;background:var(--blue);color:var(--white);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
#sidebar .logo-area{text-align:center;padding:20px 15px 10px}
#sidebar .logo-area img{max-width:220px;border-radius:12px}
#sidebar .logo-area h1{font-size:1.3em;margin-top:10px;font-weight:700;letter-spacing:1px}
#sidebar .logo-area h2{font-size:.75em;margin-top:4px;opacity:.8;font-weight:400}
#sidebar nav{flex:1;padding:10px 0}
#sidebar nav .nav-item{padding:13px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;font-size:.92em;border-left:4px solid transparent}
#sidebar nav .nav-item:hover{background:rgba(255,255,255,.12)}
#sidebar nav .nav-item.active{background:rgba(255,255,255,.18);border-left-color:var(--orange);font-weight:600}
#sidebar nav .nav-item .icon{font-size:1.2em;width:24px;text-align:center}
#sidebar .admin-area{padding:15px 20px;border-top:1px solid rgba(255,255,255,.2);font-size:.85em}
#sidebar .admin-area .admin-btn{width:100%;padding:10px;border:1.5px solid rgba(255,255,255,.5);background:transparent;color:#fff;border-radius:var(--radius);cursor:pointer;font-size:.9em;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
#sidebar .admin-area .admin-btn:hover{background:rgba(255,255,255,.15)}
#sidebar .admin-area .admin-btn.active{background:var(--orange);border-color:var(--orange)}
#main{margin-left:260px;flex:1;padding:0;min-height:100vh}
.content-section{display:none;padding:30px 35px}
.content-section.active{display:block}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:25px;flex-wrap:wrap;gap:10px}
.section-header h2{font-size:1.6em;color:var(--blue);display:flex;align-items:center;gap:10px}
.btn{padding:8px 18px;border:none;border-radius:var(--radius);cursor:pointer;font-size:.9em;display:inline-flex;align-items:center;gap:6px;transition:all .2s;font-weight:500}
.btn-primary{background:var(--blue);color:var(--white)}.btn-primary:hover{background:var(--blue-dark)}
.btn-orange{background:var(--orange);color:var(--white)}.btn-orange:hover{background:#d0750f}
.btn-danger{background:var(--danger);color:var(--white)}.btn-danger:hover{background:#c62828}
.btn-success{background:var(--success);color:var(--white)}.btn-success:hover{background:#2e7d32}
.btn-sm{padding:5px 12px;font-size:.82em}
.btn-outline{background:transparent;border:1.5px solid var(--blue);color:var(--blue)}.btn-outline:hover{background:var(--blue);color:var(--white)}
.btn-icon{background:none;border:none;cursor:pointer;font-size:1.1em;padding:4px 6px;border-radius:4px;transition:all .15s}.btn-icon:hover{background:rgba(0,0,0,.08)}
.btn-icon.edit{color:var(--blue)}.btn-icon.delete{color:var(--danger)}
.admin-only{display:none !important}
body.is-admin .admin-only{display:inline-flex !important}
.sub-tabs{display:flex;gap:0;border-bottom:2px solid var(--gray2);margin-bottom:25px;flex-wrap:wrap}
.sub-tab{padding:10px 20px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;font-weight:500;color:var(--gray3);transition:all .2s;display:flex;align-items:center;gap:6px}.sub-tab:hover{color:var(--text)}.sub-tab.active{color:var(--blue);border-bottom-color:var(--orange)}
.data-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.data-table th{background:var(--blue);color:var(--white);padding:12px 15px;text-align:left;font-weight:600;font-size:.88em;white-space:nowrap}
.data-table td{padding:10px 15px;border-bottom:1px solid var(--gray2);font-size:.9em}
.data-table tr:hover td{background:rgba(25,118,181,.04)}.data-table .total-row td{background:var(--gray);font-weight:700;border-bottom:none}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.card-header{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:var(--white);padding:18px 22px;display:flex;align-items:center;justify-content:space-between}.card-header h3{font-size:1.15em}.card-body{padding:22px}.card-actions{display:flex;gap:6px;align-items:center}
.form-group{margin-bottom:18px}.form-group label{display:block;margin-bottom:6px;font-weight:600;font-size:.9em;color:var(--text)}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1.5px solid var(--gray2);border-radius:var(--radius);font-size:.92em;font-family:inherit;transition:border .2s}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--blue)}.form-group textarea{min-height:100px;resize:vertical}
.form-row{display:flex;gap:18px;flex-wrap:wrap}.form-row .form-group{flex:1;min-width:200px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}.modal-overlay.active{display:flex}
.modal{background:var(--white);border-radius:12px;width:90%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--gray2)}.modal-header h3{font-size:1.15em;color:var(--blue)}
.modal-body{padding:24px}.modal-footer{padding:16px 24px;border-top:1px solid var(--gray2);display:flex;justify-content:flex-end;gap:10px}
.close-modal{background:none;border:none;font-size:1.5em;cursor:pointer;color:var(--gray3);line-height:1}
.pub-item{border:1px solid var(--gray2);border-radius:var(--radius);margin-bottom:20px;overflow:hidden}
.pub-header{background:var(--gray);padding:15px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray2)}.pub-header h3{color:var(--blue);font-size:1.1em}
.pub-body{padding:20px}.pub-meta{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:15px;font-size:.9em;color:var(--gray3)}.pub-meta span{display:flex;align-items:center;gap:5px}
.pub-photo{max-width:100%;max-height:300px;border-radius:var(--radius);margin-bottom:15px}
.pub-text{line-height:1.7;white-space:pre-wrap;word-wrap:break-word}.pub-text a{color:var(--blue);text-decoration:underline}
.pub-docs{margin-top:12px}.pub-docs a{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--gray);border-radius:20px;color:var(--blue);text-decoration:none;font-size:.85em;margin:3px}.pub-docs a:hover{background:var(--gray2)}
.pub-map{width:100%;height:300px;border:none;border-radius:var(--radius);margin-bottom:15px}
.doodle-section{margin:0 0 20px;padding:20px;background:#fff;border-radius:0 0 var(--radius) var(--radius)}
.doodle-section h4{color:var(--blue);margin-bottom:15px;font-size:1.05em}
.doodle-table{width:100%;border-collapse:collapse}.doodle-table th{background:var(--blue);color:var(--white);padding:10px 12px;text-align:center;font-size:.85em}.doodle-table th:first-child{text-align:left}
.doodle-table td{padding:8px 12px;border-bottom:1px solid var(--gray2);text-align:center;font-size:.88em}.doodle-table td:first-child{text-align:left}
.doodle-table .total-row td{background:var(--gray);font-weight:700}.doodle-table input[type="radio"]{transform:scale(1.2);cursor:pointer}
.file-list{list-style:none}.file-list li{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.9em}.file-list li a{color:var(--blue)}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray3)}.empty-state .icon{font-size:3em;margin-bottom:15px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.78em;font-weight:600}.badge-orange{background:rgba(232,132,26,.12);color:var(--orange)}
.separator{height:1px;background:var(--gray2);margin:20px 0}
@media(max-width:900px){#sidebar{width:220px;min-width:220px}#main{margin-left:220px}}
@media(max-width:700px){#sidebar{width:60px;min-width:60px}#sidebar .logo-area h1,#sidebar .logo-area h2,#sidebar nav .nav-item span,#sidebar .admin-area span{display:none}#sidebar .logo-area{padding:10px 5px}#sidebar .logo-area img{max-width:40px}#sidebar nav .nav-item{padding:12px;justify-content:center}#main{margin-left:60px}.content-section{padding:20px 15px}}
</style>
</head>

function loadData(){
  Promise.all([db.ref('tabNames').once('value'),db.ref('subTabNames').once('value'),db.ref('colNames').once('value'),db.ref('presentation').once('value'),db.ref('members').once('value'),db.ref('actualites').once('value'),db.ref('reunions').once('value'),db.ref('evenements').once('value'),db.ref('adminPassword').once('value')]).then(function(s){
    tabNames=s[0].val()||DEFAULT_TAB_NAMES;subTabNames=s[1].val()||DEFAULT_SUB_TAB_NAMES;colNames=s[2].val()||DEFAULT_COL_NAMES;
    presentation=s[3].val()||DEFAULT_PRESENTATION;fixDocs(presentation);
    members=toArray(s[4].val());if(!members.length)members=DEFAULT_MEMBERS;
    actualites=toArray(s[5].val());fixItems(actualites);
    reunions=toArray(s[6].val());fixItems(reunions);
    evenements=toArray(s[7].val());fixItems(evenements);
    adminPassword=s[8].val()||null;
    if(!s[0].val())fbSave('tabNames',DEFAULT_TAB_NAMES);if(!s[1].val())fbSave('subTabNames',DEFAULT_SUB_TAB_NAMES);
    if(!s[2].val())fbSave('colNames',DEFAULT_COL_NAMES);if(!s[3].val())fbSave('presentation',clean(DEFAULT_PRESENTATION));
    if(!s[4].val())fbSave('members',clean(DEFAULT_MEMBERS));
    setupListeners();startApp();
  }).catch(function(e){console.error(e);document.getElementById('loadingScreen').innerHTML='<h1>Erreur</h1><p>Impossible de charger. V\u00e9rifiez votre connexion.</p>'});
}
function setupListeners(){
  db.ref('tabNames').on('value',function(s){if(s.val()){tabNames=s.val();renderNav()}});
  db.ref('subTabNames').on('value',function(s){if(s.val()){subTabNames=s.val();if(activeTab==='presentation')renderPresentation()}});
  db.ref('colNames').on('value',function(s){if(s.val()){colNames=s.val();if(activeTab==='presentation'&&activeSubTab==='membres')renderPresentation()}});
  db.ref('presentation').on('value',function(s){if(s.val()){presentation=s.val();fixDocs(presentation);if(activeTab==='presentation')renderPresentation()}});
  db.ref('members').on('value',function(s){var v=s.val();if(v){members=toArray(v);if(activeTab==='presentation'&&activeSubTab==='membres')renderPresentation()}});
  db.ref('actualites').on('value',function(s){actualites=toArray(s.val());fixItems(actualites);if(activeTab==='actualites'||activeTab==='archiveActualites')renderCurrentTab()});
  db.ref('reunions').on('value',function(s){reunions=toArray(s.val());fixItems(reunions);if(activeTab==='reunions'||activeTab==='archiveReunions')renderCurrentTab()});
  db.ref('evenements').on('value',function(s){evenements=toArray(s.val());fixItems(evenements);if(activeTab==='evenements'||activeTab==='archiveReunions')renderCurrentTab()});
}

/* MEMBRES */
function sortedMembers(){return[...members].sort(function(a,b){return a.nom.localeCompare(b.nom,'fr')})}
function renderMembres(c){var sorted=sortedMembers();c.innerHTML='<div class="card"><div class="card-header"><h3>'+esc(subTabNames.membres)+' <span class="badge badge-orange">'+members.length+' membres</span></h3><button class="btn btn-sm btn-orange admin-only" onclick="addMember()">+ Ajouter</button></div><div class="card-body" style="padding:0;overflow-x:auto"><table class="data-table"><thead><tr><th>#</th><th>'+esc(colNames.nomPrenom)+' <button class="btn-icon edit admin-only" style="color:#fff" onclick="editColName(\'nomPrenom\')">\u270F\uFE0F</button></th><th>'+esc(colNames.email)+' <button class="btn-icon edit admin-only" style="color:#fff" onclick="editColName(\'email\')">\u270F\uFE0F</button></th><th>'+esc(colNames.telephone)+' <button class="btn-icon edit admin-only" style="color:#fff" onclick="editColName(\'telephone\')">\u270F\uFE0F</button></th><th>'+esc(colNames.societe)+' <button class="btn-icon edit admin-only" style="color:#fff" onclick="editColName(\'societe\')">\u270F\uFE0F</button></th><th>'+esc(colNames.dateIntronisation)+' <button class="btn-icon edit admin-only" style="color:#fff" onclick="editColName(\'dateIntronisation\')">\u270F\uFE0F</button></th><th class="admin-only">Actions</th></tr></thead><tbody>'+sorted.map(function(m,i){return'<tr><td>'+(i+1)+'</td><td><strong>'+esc(m.nom)+' '+esc(m.prenom)+'</strong></td><td><a href="mailto:'+esc(m.email)+'">'+esc(m.email)+'</a></td><td>'+esc(m.telephone)+'</td><td>'+esc(m.societe)+'</td><td>'+esc(m.dateIntronisation)+'</td><td class="admin-only" style="white-space:nowrap"><button class="btn-icon edit" onclick="editMember(\''+m.id+'\')">\u270F\uFE0F</button><button class="btn-icon delete" onclick="deleteMember(\''+m.id+'\')">\u{1F5D1}\uFE0F</button></td></tr>'}).join('')+'<tr class="total-row"><td colspan="7">Total : '+members.length+' membres</td></tr></tbody></table></div></div>'}
function mForm(m){m=m||{nom:'',prenom:'',email:'',telephone:'',societe:'',dateIntronisation:''};return'<div class="form-row"><div class="form-group"><label>Nom</label><input id="mN" value="'+esc(m.nom)+'"></div><div class="form-group"><label>Pr\u00e9nom</label><input id="mP" value="'+esc(m.prenom)+'"></div></div><div class="form-row"><div class="form-group"><label>Email</label><input id="mE" type="email" value="'+esc(m.email)+'"></div><div class="form-group"><label>T\u00e9l\u00e9phone</label><input id="mT" value="'+esc(m.telephone)+'"></div></div><div class="form-row"><div class="form-group"><label>Soci\u00e9t\u00e9</label><input id="mS" value="'+esc(m.societe)+'"></div><div class="form-group"><label>Date intronisation</label><input id="mD" type="date" value="'+esc(m.dateIntronisation)+'"></div></div>'}
function addMember(){openModal('Ajouter un membre',mForm(),'<button class="btn btn-primary" onclick="saveNewM()">Ajouter</button><button class="btn btn-outline" onclick="closeModal()">Annuler</button>')}
function saveNewM(){var m={id:genId(),nom:document.getElementById('mN').value.trim(),prenom:document.getElementById('mP').value.trim(),email:document.getElementById('mE').value.trim(),telephone:document.getElementById('mT').value.trim(),societe:document.getElementById('mS').value.trim(),dateIntronisation:document.getElementById('mD').value};if(!m.nom){alert('Nom requis');return}members.push(m);saveMembers();closeModal();renderPresentation()}
function editMember(id){var m=members.find(function(x){return x.id===id});if(!m)return;openModal('Modifier',mForm(m),'<button class="btn btn-primary" onclick="saveEditM(\''+id+'\')">OK</button><button class="btn btn-outline" onclick="closeModal()">Annuler</button>')}
function saveEditM(id){var m=members.find(function(x){return x.id===id});if(!m)return;m.nom=document.getElementById('mN').value.trim();m.prenom=document.getElementById('mP').value.trim();m.email=document.getElementById('mE').value.trim();m.telephone=document.getElementById('mT').value.trim();m.societe=document.getElementById('mS').value.trim();m.dateIntronisation=document.getElementById('mD').value;saveMembers();closeModal();renderPresentation()}
function deleteMember(id){if(!confirm('Supprimer ?'))return;members=members.filter(function(x){return x.id!==id});saveMembers();renderPresentation()}
/* PUB FORM */
function pubForm(it){it=it||{titre:'',date:'',heure:'',lieu:'',photo:'',contenu:''};return'<div class="form-group"><label>Titre</label><input id="pT" value="'+esc(it.titre)+'"></div><div class="form-row"><div class="form-group"><label>Date</label><input id="pD" type="date" value="'+esc(it.date)+'"></div><div class="form-group"><label>Heure</label><input id="pH" type="time" value="'+esc(it.heure)+'"></div></div><div class="form-group"><label>Lieu (pour Google Maps)</label><input id="pL" value="'+esc(it.lieu)+'" placeholder="Ex: 10 Place Grenette, Grenoble"></div><div class="form-group"><label>Photo</label><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px"><button class="btn btn-sm btn-outline" onclick="document.getElementById(\'pPF\').click()">Depuis l\'ordinateur</button><button class="btn btn-sm btn-outline" onclick="promptPhotoUrl()">Depuis une URL</button></div><input type="file" id="pPF" accept="image/*" style="display:none" onchange="handlePhoto(this)"><input type="hidden" id="pPD" value="'+(it.photo?esc(it.photo):'')+'"><div id="pPP">'+(it.photo?'<img src="'+it.photo+'" style="max-width:200px;max-height:150px;border-radius:6px">':'')+'</div></div><div class="form-group"><label>Contenu</label><textarea id="pC" rows="6">'+esc(it.contenu)+'</textarea></div><div class="form-group"><label>Documents joints</label><button class="btn btn-sm btn-outline" onclick="document.getElementById(\'pDF\').click()">+ Ajouter</button><input type="file" id="pDF" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.gif" style="display:none" onchange="handleDocUp(this)"><div id="pDL"></div></div>'}
var tmpD=[];
function handlePhoto(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){document.getElementById('pPD').value=e.target.result;document.getElementById('pPP').innerHTML='<img src="'+e.target.result+'" style="max-width:200px;max-height:150px;border-radius:6px">'};r.readAsDataURL(f)}
function promptPhotoUrl(){var u=prompt("URL de l'image :");if(u){document.getElementById('pPD').value=u;document.getElementById('pPP').innerHTML='<img src="'+u+'" style="max-width:200px;max-height:150px;border-radius:6px">'}}
function handleDocUp(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){tmpD.push({name:f.name,data:e.target.result,type:f.type});renderTmpD()};r.readAsDataURL(f)}
function renderTmpD(){var el=document.getElementById('pDL');if(!el)return;el.innerHTML=tmpD.map(function(d,i){return'<div style="display:flex;align-items:center;gap:8px;padding:4px 0">\u{1F4CE} '+esc(d.name)+' <button class="btn-icon delete" onclick="tmpD.splice('+i+',1);renderTmpD()">\u{1F5D1}\uFE0F</button></div>'}).join('')}
function getPubData(){return{titre:document.getElementById('pT').value.trim(),date:document.getElementById('pD').value,heure:document.getElementById('pH').value,lieu:document.getElementById('pL').value.trim(),photo:document.getElementById('pPD').value||'',contenu:document.getElementById('pC').value,documents:[...tmpD]}}
/* RENDER PUB */
function renderPub(it,type,arch){var ds=it.date?new Date(it.date+'T00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';var al=type==='actualites'?'Archivage actualit\u00e9s':'Archivage r\u00e9unions';var ac='';if(arch){ac='<button class="btn btn-sm btn-success admin-only" onclick="restoreItem(\''+type+'\',\''+it.id+'\')">\u21A9 Annuler</button>'}else{ac='<button class="btn-icon edit admin-only" onclick="editPub(\''+type+'\',\''+it.id+'\')">\u270F\uFE0F</button><button class="btn-icon delete admin-only" onclick="delPub(\''+type+'\',\''+it.id+'\')">\u{1F5D1}\uFE0F</button><button class="btn btn-sm btn-orange admin-only" onclick="archiveItem(\''+type+'\',\''+it.id+'\')">\u{1F4E6} '+al+'</button>'}
var h='<div class="pub-item"><div class="pub-header"><h3>'+esc(it.titre||'Sans titre')+'</h3><div class="card-actions">'+ac+'</div></div><div class="pub-body"><div class="pub-meta">'+(ds?'<span>\u{1F4C5} '+ds+'</span>':'')+(it.heure?'<span>\u{1F552} '+esc(it.heure)+'</span>':'')+(it.lieu?'<span>\u{1F4CD} '+esc(it.lieu)+'</span>':'')+'</div>';
if(it.lieu)h+='<iframe class="pub-map" src="https://maps.google.com/maps?q='+encodeURIComponent(it.lieu)+'&output=embed&z=15" loading="lazy" allowfullscreen></iframe>';
if(it.photo)h+='<img class="pub-photo" src="'+it.photo+'" alt="" onerror="this.style.display=\'none\'">';
if(it.contenu)h+='<div class="pub-text">'+linkify(it.contenu)+'</div>';
if(it.documents&&it.documents.length)h+='<div class="pub-docs">'+it.documents.map(function(d){return'<a href="'+d.data+'" download="'+esc(d.name)+'" target="_blank">\u{1F4CE} '+esc(d.name)+'</a>'}).join('')+'</div>';
return h+'</div></div>'}
/* ACTUALITES */
function renderActualites(){var a=actualites.filter(function(x){return!x.archived});document.getElementById('sec-actualites').innerHTML='<div class="section-header"><h2>'+esc(tabNames.actualites)+' <button class="btn-icon edit admin-only" onclick="editTabName(\'actualites\')">\u270F\uFE0F</button></h2><button class="btn btn-primary admin-only" onclick="createPub(\'actualites\')">+ Nouvelle publication</button></div>'+(a.length?a.map(function(x){return renderPub(x,'actualites',false)}).join(''):'<div class="empty-state"><div class="icon">\u{1F4F0}</div><p>Aucune actualit\u00e9.</p></div>')}
/* REUNIONS */
function renderReunions(){var a=reunions.filter(function(x){return!x.archived});document.getElementById('sec-reunions').innerHTML='<div class="section-header"><h2>'+esc(tabNames.reunions)+' <button class="btn-icon edit admin-only" onclick="editTabName(\'reunions\')">\u270F\uFE0F</button></h2><button class="btn btn-primary admin-only" onclick="createPub(\'reunions\')">+ Nouvelle r\u00e9union</button></div>'+(a.length?a.map(function(r){return renderPub(r,'reunions',false)+renderDoodle(r,'reunions')}).join(''):'<div class="empty-state"><div class="icon">\u{1F91D}</div><p>Aucune r\u00e9union.</p></div>')}
/* EVENEMENTS */
function renderEvenements(){var a=evenements.filter(function(x){return!x.archived});document.getElementById('sec-evenements').innerHTML='<div class="section-header"><h2>'+esc(tabNames.evenements)+' <button class="btn-icon edit admin-only" onclick="editTabName(\'evenements\')">\u270F\uFE0F</button></h2><button class="btn btn-primary admin-only" onclick="createPub(\'evenements\')">+ Nouvel \u00e9v\u00e9nement</button></div>'+(a.length?a.map(function(e){return renderPub(e,'evenements',false)+renderDoodle(e,'evenements')}).join(''):'<div class="empty-state"><div class="icon">\u{1F389}</div><p>Aucun \u00e9v\u00e9nement.</p></div>')}
/* ARCHIVES */
function renderArchiveActualites(){var a=actualites.filter(function(x){return x.archived});document.getElementById('sec-archive-actualites').innerHTML='<div class="section-header"><h2>'+esc(tabNames.archiveActualites)+' <button class="btn-icon edit admin-only" onclick="editTabName(\'archiveActualites\')">\u270F\uFE0F</button></h2></div>'+(a.length?a.map(function(x){return renderPub(x,'actualites',true)}).join(''):'<div class="empty-state"><div class="icon">\u{1F4C2}</div><p>Aucune actualit\u00e9 archiv\u00e9e.</p></div>')}
function renderArchiveReunions(){var rr=reunions.filter(function(x){return x.archived}),re=evenements.filter(function(x){return x.archived});document.getElementById('sec-archive-reunions').innerHTML='<div class="section-header"><h2>'+esc(tabNames.archiveReunions)+' <button class="btn-icon edit admin-only" onclick="editTabName(\'archiveReunions\')">\u270F\uFE0F</button></h2></div>'+(rr.length?'<h3 style="color:var(--blue);margin-bottom:15px">R\u00e9unions</h3>'+rr.map(function(r){return renderPub(r,'reunions',true)+renderDoodle(r,'reunions',true)}).join(''):'')+(re.length?'<h3 style="color:var(--blue);margin:25px 0 15px">\u00c9v\u00e9nements</h3>'+re.map(function(e){return renderPub(e,'evenements',true)+renderDoodle(e,'evenements',true)}).join(''):'')+((!rr.length&&!re.length)?'<div class="empty-state"><div class="icon">\u{1F4C1}</div><p>Aucun \u00e9l\u00e9ment archiv\u00e9.</p></div>':'')}
/* CRUD PUB */
function getColl(t){if(t==='actualites')return actualites;if(t==='reunions')return reunions;return evenements}
function saveColl(t){if(t==='actualites')saveActualites();if(t==='reunions')saveReunions();if(t==='evenements')saveEvenements()}
function createPub(t){tmpD=[];var l=t==='actualites'?'publication':t==='reunions'?'r\u00e9union':'\u00e9v\u00e9nement';openModal('Cr\u00e9er une '+l,pubForm(),'<button class="btn btn-primary" onclick="saveNewPub(\''+t+'\')">Cr\u00e9er</button><button class="btn btn-outline" onclick="closeModal()">Annuler</button>')}
function saveNewPub(t){var d=getPubData();if(!d.titre){alert('Titre requis');return}var it=Object.assign({id:genId(),archived:false,doodle:[]},d);getColl(t).push(it);saveColl(t);closeModal();renderCurrentTab()}
function editPub(t,id){var c=getColl(t),it=c.find(function(x){return x.id===id});if(!it)return;tmpD=it.documents?[...it.documents]:[];openModal('Modifier',pubForm(it),'<button class="btn btn-primary" onclick="saveEditPub(\''+t+'\',\''+id+'\')">OK</button><button class="btn btn-outline" onclick="closeModal()">Annuler</button>');setTimeout(renderTmpD,50)}
function saveEditPub(t,id){var c=getColl(t),it=c.find(function(x){return x.id===id});if(!it)return;Object.assign(it,getPubData());saveColl(t);closeModal();renderCurrentTab()}
function delPub(t,id){if(!confirm('Supprimer ?'))return;var c=getColl(t),i=c.findIndex(function(x){return x.id===id});if(i>=0)c.splice(i,1);saveColl(t);renderCurrentTab()}
function archiveItem(t,id){var c=getColl(t),it=c.find(function(x){return x.id===id});if(!it)return;it.archived=true;if(t==='reunions'||t==='evenements'){it.archivedDoodle=it.doodle?[...it.doodle]:[];it.doodle=[]}saveColl(t);renderCurrentTab()}
function restoreItem(t,id){var c=getColl(t),it=c.find(function(x){return x.id===id});if(!it)return;it.archived=false;if(t==='reunions'||t==='evenements'){if(it.archivedDoodle){it.doodle=it.archivedDoodle;delete it.archivedDoodle}}saveColl(t);renderCurrentTab()}
/* DOODLE */
function renderDoodle(it,type,arch){var isE=type==='evenements',dd=arch&&it.archivedDoodle?it.archivedDoodle:(it.doodle||[]),cP=0,cA=0,cPR=0,cAR=0;dd.forEach(function(d){if(d.present===true)cP++;if(d.present===false)cA++;if(isE){if(d.presentRepas===true)cPR++;if(d.presentRepas===false)cAR++}});
var h='<div class="doodle-section"><h4>Doodle - '+esc(it.titre)+'</h4>'+(!arch?'<div style="margin:10px 0" class="admin-only"><button class="btn btn-sm btn-primary" onclick="addDoodle(\''+type+'\',\''+it.id+'\')">+ Ajouter un participant</button></div>':'')+'<table class="doodle-table"><thead><tr><th style="text-align:left">Participant</th><th>Pr\u00e9sent</th><th>Absent</th>'+(isE?'<th>Pr\u00e9sence repas</th><th>Absence repas</th>':'')+(!arch?'<th class="admin-only">Actions</th>':'')+'</tr></thead><tbody>';
dd.forEach(function(d,i){h+='<tr><td style="text-align:left"><strong>'+esc(d.nom)+' '+esc(d.prenom)+'</strong></td><td><input type="radio" name="p_'+it.id+'_'+i+'" '+(d.present===true?'checked':'')+(arch?' disabled':'')+' onchange="updDoodle(\''+type+'\',\''+it.id+'\','+i+',\'present\',true)"></td><td><input type="radio" name="p_'+it.id+'_'+i+'" '+(d.present===false?'checked':'')+(arch?' disabled':'')+' onchange="updDoodle(\''+type+'\',\''+it.id+'\','+i+',\'present\',false)"></td>';if(isE)h+='<td><input type="radio" name="r_'+it.id+'_'+i+'" '+(d.presentRepas===true?'checked':'')+(arch?' disabled':'')+' onchange="updDoodle(\''+type+'\',\''+it.id+'\','+i+',\'presentRepas\',true)"></td><td><input type="radio" name="r_'+it.id+'_'+i+'" '+(d.presentRepas===false?'checked':'')+(arch?' disabled':'')+' onchange="updDoodle(\''+type+'\',\''+it.id+'\','+i+',\'presentRepas\',false)"></td>';if(!arch)h+='<td class="admin-only" style="white-space:nowrap"><button class="btn-icon edit" onclick="editDoodle(\''+type+'\',\''+it.id+'\','+i+')">\u270F\uFE0F</button><button class="btn-icon delete" onclick="rmDoodle(\''+type+'\',\''+it.id+'\','+i+')">\u{1F5D1}\uFE0F</button></td>';h+='</tr>'});
h+='<tr class="total-row"><td style="text-align:left"><strong>Total</strong></td><td><strong>'+cP+'</strong></td><td><strong>'+cA+'</strong></td>'+(isE?'<td><strong>'+cPR+'</strong></td><td><strong>'+cAR+'</strong></td>':'')+(!arch?'<td class="admin-only"></td>':'')+'</tr></tbody></table></div>';return h}
function addDoodle(t,iid){var s=sortedMembers(),o=s.map(function(m){return'<option value="'+m.id+'">'+esc(m.nom)+' '+esc(m.prenom)+'</option>'}).join('');openModal('Ajouter un participant','<div class="form-group"><label>Membre</label><select id="dSel">'+o+'</select></div>','<button class="btn btn-primary" onclick="saveDoodle(\''+t+'\',\''+iid+'\')">Ajouter</button><button class="btn btn-outline" onclick="closeModal()">Annuler</button>')}
function saveDoodle(t,iid){var mid=document.getElementById('dSel').value,mem=members.find(function(m){return m.id===mid});if(!mem)return;var c=getColl(t),it=c.find(function(x){return x.id===iid});if(!it)return;if(!it.doodle)it.doodle=[];if(it.doodle.find(function(d){return d.membreId===mid})){alert('D\u00e9j\u00e0 dans le doodle');return}it.doodle.push({membreId:mid,nom:mem.nom,prenom:mem.prenom,present:null,presentRepas:null});saveColl(t);closeModal();renderCurrentTab()}
function updDoodle(t,iid,idx,f,v){var c=getColl(t),it=c.find(function(x){return x.id===iid});if(!it||!it.doodle||!it.doodle[idx])return;it.doodle[idx][f]=v;saveColl(t)}
function editDoodle(t,iid,idx){var c=getColl(t),it=c.find(function(x){return x.id===iid});if(!it||!it.doodle[idx])return;var d=it.doodle[idx],s=sortedMembers(),o=s.map(function(m){return'<option value="'+m.id+'" '+(m.id===d.membreId?'selected':'')+'>'+esc(m.nom)+' '+esc(m.prenom)+'</option>'}).join('');openModal('Modifier','<div class="form-group"><label>Membre</label><select id="dSel">'+o+'</select></div>','<button class="btn btn-primary" onclick="saveEditDoodle(\''+t+'\',\''+iid+'\','+idx+')">OK</button><button class="btn btn-outline" onclick="closeModal()">Annuler</button>')}
function saveEditDoodle(t,iid,idx){var mid=document.getElementById('dSel').value,mem=members.find(function(m){return m.id===mid});if(!mem)return;var c=getColl(t),it=c.find(function(x){return x.id===iid});if(!it||!it.doodle[idx])return;it.doodle[idx].membreId=mid;it.doodle[idx].nom=mem.nom;it.doodle[idx].prenom=mem.prenom;saveColl(t);closeModal();renderCurrentTab()}
function rmDoodle(t,iid,idx){if(!confirm('Supprimer ?'))return;var c=getColl(t),it=c.find(function(x){return x.id===iid});if(!it)return;it.doodle.splice(idx,1);saveColl(t);renderCurrentTab()}
/* INIT */
loadData();
</script>
</body>
</html>
