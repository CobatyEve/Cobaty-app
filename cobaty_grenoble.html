<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBATY GRENOBLE</title>
<style>
:root{--blue:#1976B5;--blue-dark:#145A8C;--orange:#E8841A;--orange-light:#F4A94D;--white:#fff;--gray:#f4f5f7;--gray2:#e0e3e8;--gray3:#888;--text:#333;--danger:#e53935;--success:#43a047;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--gray);color:var(--text);display:flex;min-height:100vh}
/* SIDEBAR */
#sidebar{width:260px;min-width:260px;background:var(--blue);color:var(--white);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
#sidebar .logo-area{text-align:center;padding:20px 15px 10px}
#sidebar .logo-area img{max-width:220px;border-radius:12px}
#sidebar .logo-area h1{font-size:1.3em;margin-top:10px;font-weight:700;letter-spacing:1px}
#sidebar .logo-area h2{font-size:.75em;margin-top:4px;opacity:.8;font-weight:400}
#sidebar nav{flex:1;padding:10px 0}
#sidebar nav .nav-item{padding:13px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;font-size:.92em;border-left:4px solid transparent}
#sidebar nav .nav-item:hover{background:rgba(255,255,255,.12)}
#sidebar nav .nav-item.active{background:rgba(255,255,255,.18);border-left-color:var(--orange);font-weight:600}
#sidebar nav .nav-item .icon{font-size:1.2em;width:24px;text-align:center}
/* MAIN */
#main{margin-left:260px;flex:1;padding:0;min-height:100vh}
.content-section{display:none;padding:30px 35px}
.content-section.active{display:block}
/* HEADERS */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:25px;flex-wrap:wrap;gap:10px}
.section-header h2{font-size:1.6em;color:var(--blue);display:flex;align-items:center;gap:10px}
/* BUTTONS */
.btn{padding:8px 18px;border:none;border-radius:var(--radius);cursor:pointer;font-size:.9em;display:inline-flex;align-items:center;gap:6px;transition:all .2s;font-weight:500}
.btn-primary{background:var(--blue);color:var(--white)}
.btn-primary:hover{background:var(--blue-dark)}
.btn-orange{background:var(--orange);color:var(--white)}
.btn-orange:hover{background:#d0750f}
.btn-danger{background:var(--danger);color:var(--white)}
.btn-danger:hover{background:#c62828}
.btn-success{background:var(--success);color:var(--white)}
.btn-success:hover{background:#2e7d32}
.btn-sm{padding:5px 12px;font-size:.82em}
.btn-outline{background:transparent;border:1.5px solid var(--blue);color:var(--blue)}
.btn-outline:hover{background:var(--blue);color:var(--white)}
.btn-icon{background:none;border:none;cursor:pointer;font-size:1.1em;padding:4px 6px;border-radius:4px;transition:all .15s}
.btn-icon:hover{background:rgba(0,0,0,.08)}
.btn-icon.edit{color:var(--blue)}
.btn-icon.delete{color:var(--danger)}
.btn-icon.archive{color:var(--orange)}
/* SUB TABS */
.sub-tabs{display:flex;gap:0;border-bottom:2px solid var(--gray2);margin-bottom:25px;flex-wrap:wrap}
.sub-tab{padding:10px 20px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;font-weight:500;color:var(--gray3);transition:all .2s;display:flex;align-items:center;gap:6px}
.sub-tab:hover{color:var(--text)}
.sub-tab.active{color:var(--blue);border-bottom-color:var(--orange)}
.sub-content{display:none}
.sub-content.active{display:block}
/* TABLE */
.data-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.data-table th{background:var(--blue);color:var(--white);padding:12px 15px;text-align:left;font-weight:600;font-size:.88em;white-space:nowrap}
.data-table td{padding:10px 15px;border-bottom:1px solid var(--gray2);font-size:.9em}
.data-table tr:hover td{background:rgba(25,118,181,.04)}
.data-table .total-row td{background:var(--gray);font-weight:700;border-bottom:none}
/* CARD */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.card-header{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:var(--white);padding:18px 22px;display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:1.15em}
.card-body{padding:22px}
.card-actions{display:flex;gap:6px;align-items:center}
/* FORM */
.form-group{margin-bottom:18px}
.form-group label{display:block;margin-bottom:6px;font-weight:600;font-size:.9em;color:var(--text)}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1.5px solid var(--gray2);border-radius:var(--radius);font-size:.92em;font-family:inherit;transition:border .2s}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--blue)}
.form-group textarea{min-height:100px;resize:vertical}
.form-row{display:flex;gap:18px;flex-wrap:wrap}
.form-row .form-group{flex:1;min-width:200px}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--white);border-radius:12px;width:90%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--gray2)}
.modal-header h3{font-size:1.15em;color:var(--blue)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray2);display:flex;justify-content:flex-end;gap:10px}
.close-modal{background:none;border:none;font-size:1.5em;cursor:pointer;color:var(--gray3);line-height:1}
/* PUBLICATION / ITEM */
.pub-item{border:1px solid var(--gray2);border-radius:var(--radius);margin-bottom:20px;overflow:hidden}
.pub-header{background:var(--gray);padding:15px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray2)}
.pub-header h3{color:var(--blue);font-size:1.1em}
.pub-body{padding:20px}
.pub-meta{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:15px;font-size:.9em;color:var(--gray3)}
.pub-meta span{display:flex;align-items:center;gap:5px}
.pub-photo{max-width:100%;max-height:300px;border-radius:var(--radius);margin-bottom:15px}
.pub-text{line-height:1.7;white-space:pre-wrap;word-wrap:break-word}
.pub-text a{color:var(--blue);text-decoration:underline}
.pub-docs{margin-top:12px}
.pub-docs a{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--gray);border-radius:20px;color:var(--blue);text-decoration:none;font-size:.85em;margin:3px}
.pub-docs a:hover{background:var(--gray2)}
.pub-map{width:100%;height:300px;border:none;border-radius:var(--radius);margin-bottom:15px}
/* DOODLE */
.doodle-section{margin-top:25px;border-top:2px solid var(--gray2);padding-top:20px}
.doodle-section h4{color:var(--blue);margin-bottom:15px;font-size:1.05em}
.doodle-table{width:100%;border-collapse:collapse}
.doodle-table th{background:var(--blue);color:var(--white);padding:10px 12px;text-align:center;font-size:.85em}
.doodle-table th:first-child{text-align:left}
.doodle-table td{padding:8px 12px;border-bottom:1px solid var(--gray2);text-align:center;font-size:.88em}
.doodle-table td:first-child{text-align:left}
.doodle-table .total-row td{background:var(--gray);font-weight:700}
.doodle-table input[type="radio"]{transform:scale(1.2);cursor:pointer}
/* RICHTEXT AREA */
.rich-area{border:1.5px solid var(--gray2);border-radius:var(--radius);padding:15px;min-height:120px;line-height:1.7;font-size:.95em}
.rich-area:focus{outline:none;border-color:var(--blue)}
.rich-area a{color:var(--blue)}
/* MISC */
.empty-state{text-align:center;padding:60px 20px;color:var(--gray3)}
.empty-state .icon{font-size:3em;margin-bottom:15px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.78em;font-weight:600}
.badge-blue{background:rgba(25,118,181,.12);color:var(--blue)}
.badge-orange{background:rgba(232,132,26,.12);color:var(--orange)}
.file-list{list-style:none}
.file-list li{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.9em}
.file-list li a{color:var(--blue)}
.archive-notice{background:rgba(232,132,26,.08);border:1px solid var(--orange-light);border-radius:var(--radius);padding:12px 18px;margin-bottom:15px;display:flex;align-items:center;justify-content:space-between}
.archive-notice span{color:var(--orange);font-weight:500;font-size:.9em}
.separator{height:1px;background:var(--gray2);margin:20px 0}
@media(max-width:900px){#sidebar{width:220px;min-width:220px}#main{margin-left:220px}}
@media(max-width:700px){#sidebar{width:60px;min-width:60px}#sidebar .logo-area h1,#sidebar .logo-area h2,#sidebar nav .nav-item span{display:none}#sidebar .logo-area{padding:10px 5px}#sidebar .logo-area img{max-width:40px}#sidebar nav .nav-item{padding:12px;justify-content:center}#main{margin-left:60px}.content-section{padding:20px 15px}}
</style>
</head>

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function linkify(text) {
  if(!text) return '';
  return esc(text).replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

/* ========== NAVIGATION ========== */
let activeTab = 'presentation';
let activeSubTab = 'informations';

const navIcons = {
  presentation: '\u{1F3E0}', actualites: '\u{1F4F0}', reunions: '\u{1F91D}',
  evenements: '\u{1F389}', archiveActualites: '\u{1F4C2}', archiveReunions: '\u{1F4C1}'
};

function renderNav() {
  const nav = document.getElementById('mainNav');
  const tabs = ['presentation','actualites','reunions','evenements','archiveActualites','archiveReunions'];
  nav.innerHTML = tabs.map(t => `
    <div class="nav-item ${activeTab===t?'active':''}" onclick="switchTab('${t}')">
      <span class="icon">${navIcons[t]}</span>
      <span>${esc(tabNames[t])}</span>
    </div>
  `).join('');
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.content-section').forEach(s=>s.classList.remove('active'));
  const secMap = {
    presentation:'sec-presentation', actualites:'sec-actualites',
    reunions:'sec-reunions', evenements:'sec-evenements',
    archiveActualites:'sec-archive-actualites', archiveReunions:'sec-archive-reunions'
  };
  document.getElementById(secMap[tab]).classList.add('active');
  renderNav();
  renderCurrentTab();
}

function renderCurrentTab() {
  switch(activeTab) {
    case 'presentation': renderPresentation(); break;
    case 'actualites': renderActualites(); break;
    case 'reunions': renderReunions(); break;
    case 'evenements': renderEvenements(); break;
    case 'archiveActualites': renderArchiveActualites(); break;
    case 'archiveReunions': renderArchiveReunions(); break;
  }
}

/* ========== MODAL ========== */
function openModal(title, bodyHtml, footerHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = footerHtml || '';
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});

/* ========== PRESENTATION ========== */
function renderPresentation() {

  sec.innerHTML = `
    <div class="section-header">
      <h2>${esc(tabNames.presentation)} <button class="btn-icon edit" onclick="editTabName('presentation')" title="Modifier">\u270F\uFE0F</button></h2>
    </div>
    <div class="sub-tabs">
      ${stKeys.map(k=>`
        <div class="sub-tab ${activeSubTab===k?'active':''}" onclick="activeSubTab='${k}';renderPresentation()">
          ${esc(subTabNames[k])}
          <button class="btn-icon edit" onclick="event.stopPropagation();editSubTabName('${k}')" title="Modifier">\u270F\uFE0F</button>
        </div>
      `).join('')}
    </div>
    <div id="subContent"></div>
  `;
  const sc = document.getElementById('subContent');
  switch(activeSubTab) {
    case 'informations': renderPresentationInfo(sc); break;
    case 'documentsAdmin': renderDocSection(sc, 'documentsAdmin', 'informationsDocs'); break;
    case 'commissionTB': renderCommission(sc, 'commissionTB', 'commissionTBDocs'); break;
    case 'commissionRH': renderCommission(sc, 'commissionRH', 'commissionRHDocs'); break;
    case 'commissionsDivers': renderCommission(sc, 'commissionsDivers', 'commissionsDiversDocs'); break;
    case 'membres': renderMembres(sc); break;
  }
}

function renderPresentationInfo(container) {
  container.innerHTML = `
    <div class="card">
      <div class="card-header"><h3>Informations</h3>

  const current = presentation[field] || '';
  openModal("Modifier le contenu",
    `<div class="form-group"><label>Contenu (vous pouvez ins\u00e9rer des URLs qui seront cliquables)</label>

    `<button class="btn btn-primary" onclick="savePresentationText('${field}')">Enregistrer</button>

  presentation[field] = document.getElementById('editPresText').value;

function renderDocSection(container, subTab, docsKey) {
  container.innerHTML = `
    <div class="card">
      <div class="card-header"><h3>${esc(subTabNames[subTab])}</h3>
        <button class="btn btn-sm btn-orange" onclick="addDocToPresentation('${docsKey}')">+ Ajouter un fichier</button>
      </div>
      <div class="card-body">
        ${renderFileList(presentation[docsKey] || [], docsKey)}
        ${!(presentation[docsKey]||[]).length ? '<p style="color:#999;text-align:center">Aucun document. Cliquez sur "+ Ajouter" pour commencer.</p>' : ''}
      </div>
    </div>
  `;
}

function renderCommission(container, textKey, docsKey) {
  container.innerHTML = `
    <div class="card">
      <div class="card-header"><h3>${esc(subTabNames[textKey])}</h3>
        <button class="btn btn-sm btn-orange" onclick="editPresentationText('${textKey}')">
          \u270F\uFE0F Modifier le texte
        </button>
      </div>
      <div class="card-body">
        <div class="pub-text">${linkify(presentation[textKey]) || '<em style="color:#999">Cliquez sur "Modifier" pour ajouter du contenu...</em>'}</div>
        <div class="separator"></div>
        <h4 style="margin-bottom:10px">Documents</h4>
        <div style="margin-bottom:10px"><button class="btn btn-sm btn-primary" onclick="addDocToPresentation('${docsKey}')">+ Ajouter un fichier</button></div>
        ${renderFileList(presentation[docsKey] || [], docsKey)}
      </div>
    </div>
  `;
}

function renderFileList(docs, docsKey) {
  if(!docs.length) return '';
  return `<ul class="file-list">${docs.map((d,i)=>`
    <li>
      <a href="${d.data}" download="${esc(d.name)}" target="_blank">\u{1F4CE} ${esc(d.name)}</a>
      <button class="btn-icon delete" onclick="removeDoc('${docsKey}',${i})" title="Supprimer">\u{1F5D1}\uFE0F</button>
    </li>
  `).join('')}</ul>`;
}

function addDocToPresentation(docsKey) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.pdf,.doc,.docx,.jpg,.jpeg,.png,.gif,.webp';
  input.onchange = function() {
    const file = this.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      if(!presentation[docsKey]) presentation[docsKey] = [];
      presentation[docsKey].push({ name: file.name, data: e.target.result, type: file.type });
      savePresentation(); renderPresentation();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function removeDoc(docsKey, idx) {
  if(confirm('Supprimer ce document ?')) {
    presentation[docsKey].splice(idx, 1);
    savePresentation(); renderPresentation();
  }
}

function addMember() {
  openModal('Ajouter un membre', memberFormHtml(),
    `<button class="btn btn-primary" onclick="saveNewMember()">Ajouter</button>
     <button class="btn btn-outline" onclick="closeModal()">Annuler</button>`);
}
function saveNewMember() {
  const m = {
    id: genId(), nom: document.getElementById('mNom').value.trim(),
    prenom: document.getElementById('mPrenom').value.trim(),
    email: document.getElementById('mEmail').value.trim(),
    telephone: document.getElementById('mTel').value.trim(),
    societe: document.getElementById('mSociete').value.trim(),
    dateIntronisation: document.getElementById('mDate').value
  };
  if(!m.nom) { alert('Le nom est requis'); return; }
  members.push(m); saveMembers(); closeModal(); renderPresentation();
}

function editMember(id) {
  const m = members.find(x=>x.id===id);
  if(!m) return;
  openModal('Modifier le membre', memberFormHtml(m),
    `<button class="btn btn-primary" onclick="saveEditMember('${id}')">Enregistrer</button>
     <button class="btn btn-outline" onclick="closeModal()">Annuler</button>`);
}
function saveEditMember(id) {
  const m = members.find(x=>x.id===id);
  if(!m) return;
  m.nom = document.getElementById('mNom').value.trim();
  m.prenom = document.getElementById('mPrenom').value.trim();
  m.email = document.getElementById('mEmail').value.trim();
  m.telephone = document.getElementById('mTel').value.trim();
  m.societe = document.getElementById('mSociete').value.trim();
  m.dateIntronisation = document.getElementById('mDate').value;
  saveMembers(); closeModal(); renderPresentation();
}

function deleteMember(id) {
  if(!confirm('Supprimer ce membre ?')) return;
  members = members.filter(x=>x.id!==id);
  saveMembers(); renderPresentation();
}

/* ========== PUBLICATION/ITEM FORM (shared for Actualites, Reunions, Evenements) ========== */
function pubFormHtml(item, type) {
  item = item || {titre:'',date:'',heure:'',lieu:'',googleMapsQuery:'',photoUrl:'',contenu:'',documents:[]};
  return `
    <div class="form-group"><label>Titre</label><input id="pubTitre" value="${esc(item.titre)}"></div>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input id="pubDate" type="date" value="${esc(item.date)}"></div>
      <div class="form-group"><label>Heure</label><input id="pubHeure" type="time" value="${esc(item.heure)}"></div>
    </div>
    <div class="form-group"><label>Lieu (adresse pour Google Maps)</label><input id="pubLieu" value="${esc(item.lieu)}" placeholder="Ex: 10 Place Grenette, Grenoble"></div>
    <div class="form-group">
      <label>Photo</label>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px">
        <button class="btn btn-sm btn-outline" onclick="document.getElementById('pubPhotoFile').click()">Depuis l'ordinateur</button>
        <button class="btn btn-sm btn-outline" onclick="promptPhotoUrl()">Depuis une URL</button>
      </div>
      <input type="file" id="pubPhotoFile" accept="image/*" style="display:none" onchange="handlePhotoUpload(this)">
      <input type="hidden" id="pubPhotoData" value="${item.photo ? esc(item.photo) : ''}">
      <div id="pubPhotoPreview">${item.photo ? `<img src="${item.photo}" style="max-width:200px;max-height:150px;border-radius:6px">` : ''}</div>
    </div>
    <div class="form-group"><label>Contenu (texte libre, les URLs seront cliquables)</label>
      <textarea id="pubContenu" rows="6">${esc(item.contenu)}</textarea>
    </div>
    <div class="form-group">
      <label>Documents joints (PDF, Word, images)</label>
      <button class="btn btn-sm btn-outline" onclick="document.getElementById('pubDocFile').click()">+ Ajouter un document</button>
      <input type="file" id="pubDocFile" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.gif" style="display:none" onchange="handleDocUpload(this)">
      <div id="pubDocsList"></div>
    </div>
  `;
}

let tempDocs = [];
function handlePhotoUpload(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('pubPhotoData').value = e.target.result;
    document.getElementById('pubPhotoPreview').innerHTML = `<img src="${e.target.result}" style="max-width:200px;max-height:150px;border-radius:6px">`;
  };
  reader.readAsDataURL(file);
}

function promptPhotoUrl() {
  const url = prompt("Entrez l'URL de l'image :");
  if(url) {
    document.getElementById('pubPhotoData').value = url;
    document.getElementById('pubPhotoPreview').innerHTML = `<img src="${url}" style="max-width:200px;max-height:150px;border-radius:6px" onerror="this.alt='Image non trouv\u00e9e'">`;
  }
}

function handleDocUpload(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    tempDocs.push({ name: file.name, data: e.target.result, type: file.type });
    renderTempDocs();
  };
  reader.readAsDataURL(file);
}

function renderTempDocs() {
  const el = document.getElementById('pubDocsList');
  if(!el) return;
  el.innerHTML = tempDocs.map((d,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:4px 0">
      <span>\u{1F4CE} ${esc(d.name)}</span>
      <button class="btn-icon delete" onclick="tempDocs.splice(${i},1);renderTempDocs()">\u{1F5D1}\uFE0F</button>
    </div>
  `).join('');
}

function getPubFormData() {
  return {
    titre: document.getElementById('pubTitre').value.trim(),
    date: document.getElementById('pubDate').value,
    heure: document.getElementById('pubHeure').value,
    lieu: document.getElementById('pubLieu').value.trim(),
    photo: document.getElementById('pubPhotoData').value || '',
    contenu: document.getElementById('pubContenu').value,
    documents: [...tempDocs]
  };
}

/* ========== RENDER PUBLICATION ITEM ========== */
function renderPubItem(item, type, archiveMode) {
  const dateStr = item.date ? new Date(item.date+'T00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : '';
  const archiveBtnLabel = type === 'actualites' ? 'Archivage actualit\u00e9s' : 'Archivage r\u00e9unions';
  const archiveAction = `archiveItem('${type}','${item.id}')`;
  const restoreAction = `restoreItem('${type}','${item.id}')`;

  let actionsHtml = '';
  if(archiveMode) {
    actionsHtml = `<button class="btn btn-sm btn-success" onclick="${restoreAction}">\u21A9 Annuler l'archivage</button>`;
  } else {
    actionsHtml = `
      <button class="btn-icon edit" onclick="editPubItem('${type}','${item.id}')" title="Modifier">\u270F\uFE0F</button>
      <button class="btn-icon delete" onclick="deletePubItem('${type}','${item.id}')" title="Supprimer">\u{1F5D1}\uFE0F</button>
      <button class="btn btn-sm btn-orange" onclick="${archiveAction}" title="Archiver">\u{1F4E6} ${archiveBtnLabel}</button>
    `;
  }

  let html = `<div class="pub-item">
    <div class="pub-header">
      <h3>${esc(item.titre) || 'Sans titre'}</h3>
      <div class="card-actions">${actionsHtml}</div>
    </div>
    <div class="pub-body">
      <div class="pub-meta">
        ${dateStr ? `<span>\u{1F4C5} ${dateStr}</span>` : ''}
        ${item.heure ? `<span>\u{1F552} ${esc(item.heure)}</span>` : ''}
        ${item.lieu ? `<span>\u{1F4CD} ${esc(item.lieu)}</span>` : ''}
      </div>`;

  if(item.lieu) {
    html += `<iframe class="pub-map" src="https://maps.google.com/maps?q=${encodeURIComponent(item.lieu)}&output=embed&z=15" loading="lazy" allowfullscreen></iframe>`;
  }
  if(item.photo) {
    html += `<img class="pub-photo" src="${item.photo}" alt="Photo" onerror="this.style.display='none'">`;
  }
  if(item.contenu) {
    html += `<div class="pub-text">${linkify(item.contenu)}</div>`;
  }
  if(item.documents && item.documents.length) {
    html += `<div class="pub-docs">${item.documents.map(d=>`<a href="${d.data}" download="${esc(d.name)}" target="_blank">\u{1F4CE} ${esc(d.name)}</a>`).join('')}</div>`;
  }

  html += `</div></div>`;
  return html;
}

/* ========== ACTUALITES ========== */
function renderActualites() {
  const active = actualites.filter(a=>!a.archived);
  const sec = document.getElementById('sec-actualites');
  sec.innerHTML = `
    <div class="section-header">
      <h2>${esc(tabNames.actualites)} <button class="btn-icon edit" onclick="editTabName('actualites')">\u270F\uFE0F</button></h2>
      <button class="btn btn-primary" onclick="createPubItem('actualites')">+ Nouvelle publication</button>
    </div>
    ${active.length ? active.map(a=>renderPubItem(a,'actualites',false)).join('') :
      '<div class="empty-state"><div class="icon">\u{1F4F0}</div><p>Aucune actualit\u00e9. Cr\u00e9ez votre premi\u00e8re publication !</p></div>'}
  `;
}

/* ========== REUNIONS ========== */
function renderReunions() {
  const active = reunions.filter(a=>!a.archived);
  const sec = document.getElementById('sec-reunions');
  sec.innerHTML = `
    <div class="section-header">
      <h2>${esc(tabNames.reunions)} <button class="btn-icon edit" onclick="editTabName('reunions')">\u270F\uFE0F</button></h2>
      <button class="btn btn-primary" onclick="createPubItem('reunions')">+ Nouvelle r\u00e9union</button>
    </div>
    ${active.length ? active.map(r=>renderPubItem(r,'reunions',false) + renderDoodle(r,'reunions')).join('') :
      '<div class="empty-state"><div class="icon">\u{1F91D}</div><p>Aucune r\u00e9union. Cr\u00e9ez votre premi\u00e8re r\u00e9union !</p></div>'}
  `;
}

/* ========== EVENEMENTS ========== */
function renderEvenements() {
  const active = evenements.filter(a=>!a.archived);
  const sec = document.getElementById('sec-evenements');
  sec.innerHTML = `
    <div class="section-header">
      <h2>${esc(tabNames.evenements)} <button class="btn-icon edit" onclick="editTabName('evenements')">\u270F\uFE0F</button></h2>
      <button class="btn btn-primary" onclick="createPubItem('evenements')">+ Nouvel \u00e9v\u00e9nement</button>
    </div>
    ${active.length ? active.map(e=>renderPubItem(e,'evenements',false) + renderDoodle(e,'evenements')).join('') :
      '<div class="empty-state"><div class="icon">\u{1F389}</div><p>Aucun \u00e9v\u00e9nement. Cr\u00e9ez votre premier \u00e9v\u00e9nement !</p></div>'}
  `;
}

/* ========== ARCHIVES ========== */
function renderArchiveActualites() {
  const archived = actualites.filter(a=>a.archived);
  const sec = document.getElementById('sec-archive-actualites');
  sec.innerHTML = `
    <div class="section-header">
      <h2>${esc(tabNames.archiveActualites)} <button class="btn-icon edit" onclick="editTabName('archiveActualites')">\u270F\uFE0F</button></h2>
    </div>
    ${archived.length ? archived.map(a=>renderPubItem(a,'actualites',true)).join('') :
      '<div class="empty-state"><div class="icon">\u{1F4C2}</div><p>Aucune actualit\u00e9 archiv\u00e9e.</p></div>'}
  `;
}

function renderArchiveReunions() {
  const archivedR = reunions.filter(a=>a.archived);
  const archivedE = evenements.filter(a=>a.archived);
  const sec = document.getElementById('sec-archive-reunions');
  sec.innerHTML = `
    <div class="section-header">
      <h2>${esc(tabNames.archiveReunions)} <button class="btn-icon edit" onclick="editTabName('archiveReunions')">\u270F\uFE0F</button></h2>
    </div>
    ${archivedR.length ? '<h3 style="color:var(--blue);margin-bottom:15px">R\u00e9unions archiv\u00e9es</h3>' + archivedR.map(r=>renderPubItem(r,'reunions',true) + renderDoodle(r,'reunions',true)).join('') : ''}
    ${archivedE.length ? '<h3 style="color:var(--blue);margin:25px 0 15px">\u00c9v\u00e9nements archiv\u00e9s</h3>' + archivedE.map(e=>renderPubItem(e,'evenements',true) + renderDoodle(e,'evenements',true)).join('') : ''}
    ${!archivedR.length && !archivedE.length ? '<div class="empty-state"><div class="icon">\u{1F4C1}</div><p>Aucun \u00e9l\u00e9ment archiv\u00e9.</p></div>' : ''}
  `;
}

/* ========== CRUD PUB ITEMS ========== */
function getCollection(type) {
  if(type==='actualites') return actualites;
  if(type==='reunions') return reunions;
  if(type==='evenements') return evenements;
}
function saveCollection(type) {
  if(type==='actualites') saveActualites();
  if(type==='reunions') saveReunions();
  if(type==='evenements') saveEvenements();
}

function createPubItem(type) {
  tempDocs = [];
  const label = type==='actualites' ? 'publication' : type==='reunions' ? 'r\u00e9union' : '\u00e9v\u00e9nement';
  openModal(`Cr\u00e9er une ${label}`, pubFormHtml(null, type),
    `<button class="btn btn-primary" onclick="saveNewPubItem('${type}')">Cr\u00e9er</button>
     <button class="btn btn-outline" onclick="closeModal()">Annuler</button>`);
}

function saveNewPubItem(type) {
  const data = getPubFormData();
  if(!data.titre) { alert('Le titre est requis'); return; }
  const item = { id: genId(), ...data, archived: false, doodle: [] };
  getCollection(type).push(item);
  saveCollection(type); closeModal(); renderCurrentTab();
}

function editPubItem(type, id) {
  const coll = getCollection(type);
  const item = coll.find(x=>x.id===id);
  if(!item) return;
  tempDocs = item.documents ? [...item.documents] : [];
  const label = type==='actualites' ? 'la publication' : type==='reunions' ? 'la r\u00e9union' : "l'\u00e9v\u00e9nement";
  openModal(`Modifier ${label}`, pubFormHtml(item, type),
    `<button class="btn btn-primary" onclick="saveEditPubItem('${type}','${id}')">Enregistrer</button>
     <button class="btn btn-outline" onclick="closeModal()">Annuler</button>`);
  setTimeout(renderTempDocs, 50);
}

function saveEditPubItem(type, id) {
  const coll = getCollection(type);
  const item = coll.find(x=>x.id===id);
  if(!item) return;
  const data = getPubFormData();
  Object.assign(item, data);
  saveCollection(type); closeModal(); renderCurrentTab();
}

function deletePubItem(type, id) {
  if(!confirm('Supprimer cet \u00e9l\u00e9ment ?')) return;
  const coll = getCollection(type);
  const idx = coll.findIndex(x=>x.id===id);
  if(idx>=0) coll.splice(idx, 1);
  saveCollection(type); renderCurrentTab();
}

function archiveItem(type, id) {
  const coll = getCollection(type);
  const item = coll.find(x=>x.id===id);
  if(!item) return;
  item.archived = true;
  /* Save doodle with archive for reunions/evenements */
  if(type==='reunions' || type==='evenements') {
    item.archivedDoodle = item.doodle ? [...item.doodle] : [];
    item.doodle = []; /* Reset doodle for active tab */
  }
  saveCollection(type); renderCurrentTab();
}

function restoreItem(type, id) {
  const coll = getCollection(type);
  const item = coll.find(x=>x.id===id);
  if(!item) return;
  item.archived = false;
  if(type==='reunions' || type==='evenements') {
    if(item.archivedDoodle) {
      item.doodle = item.archivedDoodle;
      delete item.archivedDoodle;
    }
  }
  saveCollection(type); renderCurrentTab();
}

/* ========== DOODLE ========== */
function renderDoodle(item, type, archiveMode) {
  const isEvent = type === 'evenements';
  const doodle = archiveMode && item.archivedDoodle ? item.archivedDoodle : (item.doodle || []);

  /* Counts */
  let countPresent = 0, countAbsent = 0, countPresentRepas = 0, countAbsentRepas = 0;
  doodle.forEach(d => {
    if(d.present === true) countPresent++;
    if(d.present === false) countAbsent++;
    if(isEvent) {
      if(d.presentRepas === true) countPresentRepas++;
      if(d.presentRepas === false) countAbsentRepas++;
    }
  });

  let html = `<div class="doodle-section" style="margin:0 0 20px;padding:20px;background:#fff;border-radius:0 0 var(--radius) var(--radius)">
    <h4>Doodle - ${esc(item.titre)}</h4>
    ${!archiveMode ? `<div style="margin:10px 0"><button class="btn btn-sm btn-primary" onclick="addDoodleEntry('${type}','${item.id}')">+ Ajouter un participant</button></div>` : ''}
    <table class="doodle-table">
      <thead><tr>
        <th style="text-align:left">Participant</th>
        <th>Pr\u00e9sent</th>
        <th>Absent</th>
        ${isEvent ? '<th>Pr\u00e9sence repas</th><th>Absence repas</th>' : ''}
        ${!archiveMode ? '<th>Actions</th>' : ''}
      </tr></thead>
      <tbody>`;

  doodle.forEach((d, i) => {
    html += `<tr>
      <td style="text-align:left"><strong>${esc(d.nom)} ${esc(d.prenom)}</strong></td>
      <td><input type="radio" name="pres_${item.id}_${i}" ${d.present===true?'checked':''} ${archiveMode?'disabled':''} onchange="updateDoodle('${type}','${item.id}',${i},'present',true)"></td>
      <td><input type="radio" name="pres_${item.id}_${i}" ${d.present===false?'checked':''} ${archiveMode?'disabled':''} onchange="updateDoodle('${type}','${item.id}',${i},'present',false)"></td>`;
    if(isEvent) {
      html += `<td><input type="radio" name="repas_${item.id}_${i}" ${d.presentRepas===true?'checked':''} ${archiveMode?'disabled':''} onchange="updateDoodle('${type}','${item.id}',${i},'presentRepas',true)"></td>
      <td><input type="radio" name="repas_${item.id}_${i}" ${d.presentRepas===false?'checked':''} ${archiveMode?'disabled':''} onchange="updateDoodle('${type}','${item.id}',${i},'presentRepas',false)"></td>`;
    }
    if(!archiveMode) {
      html += `<td style="white-space:nowrap">
        <button class="btn-icon edit" onclick="editDoodleEntry('${type}','${item.id}',${i})">\u270F\uFE0F</button>
        <button class="btn-icon delete" onclick="removeDoodleEntry('${type}','${item.id}',${i})">\u{1F5D1}\uFE0F</button>
      </td>`;
    }
    html += `</tr>`;
  });

  html += `<tr class="total-row">
    <td style="text-align:left"><strong>Total</strong></td>
    <td><strong>${countPresent}</strong></td>
    <td><strong>${countAbsent}</strong></td>
    ${isEvent ? `<td><strong>${countPresentRepas}</strong></td><td><strong>${countAbsentRepas}</strong></td>` : ''}
    ${!archiveMode ? '<td></td>' : ''}
  </tr>`;

  html += `</tbody></table></div>`;
  return html;
}

function addDoodleEntry(type, itemId) {
  const sorted = sortedMembers();
  const options = sorted.map(m=>`<option value="${m.id}">${esc(m.nom)} ${esc(m.prenom)}</option>`).join('');
  openModal('Ajouter un participant',
    `<div class="form-group"><label>S\u00e9lectionnez un membre</label>
      <select id="doodleMemberSelect">${options}</select>
    </div>`,
    `<button class="btn btn-primary" onclick="saveDoodleEntry('${type}','${itemId}')">Ajouter</button>
     <button class="btn btn-outline" onclick="closeModal()">Annuler</button>`);
}

function saveDoodleEntry(type, itemId) {
  const memId = document.getElementById('doodleMemberSelect').value;
  const mem = members.find(m=>m.id===memId);
  if(!mem) return;
  const coll = getCollection(type);
  const item = coll.find(x=>x.id===itemId);
  if(!item) return;
  if(!item.doodle) item.doodle = [];
  /* Check if already added */
  if(item.doodle.find(d=>d.membreId===memId)) {
    alert('Ce membre est d\u00e9j\u00e0 dans le doodle.');
    return;
  }
  item.doodle.push({ membreId: memId, nom: mem.nom, prenom: mem.prenom, present: null, presentRepas: null });
  saveCollection(type); closeModal(); renderCurrentTab();
}

function updateDoodle(type, itemId, idx, field, value) {
  const coll = getCollection(type);
  const item = coll.find(x=>x.id===itemId);
  if(!item || !item.doodle[idx]) return;
  item.doodle[idx][field] = value;
  saveCollection(type);
}

function editDoodleEntry(type, itemId, idx) {
  const coll = getCollection(type);
  const item = coll.find(x=>x.id===itemId);
  if(!item || !item.doodle[idx]) return;
  const d = item.doodle[idx];
  const sorted = sortedMembers();
  const options = sorted.map(m=>`<option value="${m.id}" ${m.id===d.membreId?'selected':''}>${esc(m.nom)} ${esc(m.prenom)}</option>`).join('');
  openModal('Modifier le participant',
    `<div class="form-group"><label>Membre</label><select id="doodleMemberSelect">${options}</select></div>`,
    `<button class="btn btn-primary" onclick="saveEditDoodleEntry('${type}','${itemId}',${idx})">Enregistrer</button>
     <button class="btn btn-outline" onclick="closeModal()">Annuler</button>`);
}

function saveEditDoodleEntry(type, itemId, idx) {
  const memId = document.getElementById('doodleMemberSelect').value;
  const mem = members.find(m=>m.id===memId);
  if(!mem) return;
  const coll = getCollection(type);
  const item = coll.find(x=>x.id===itemId);
  if(!item || !item.doodle[idx]) return;
  item.doodle[idx].membreId = memId;
  item.doodle[idx].nom = mem.nom;
  item.doodle[idx].prenom = mem.prenom;
  saveCollection(type); closeModal(); renderCurrentTab();
}

function removeDoodleEntry(type, itemId, idx) {
  if(!confirm('Supprimer ce participant ?')) return;
  const coll = getCollection(type);
  const item = coll.find(x=>x.id===itemId);
  if(!item) return;
  item.doodle.splice(idx, 1);
  saveCollection(type); renderCurrentTab();
}

/* ========== INIT ========== */
renderNav();
switchTab('presentation');
</script>
